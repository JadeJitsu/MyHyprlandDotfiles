# Commands and Apps to be executed at launch

# Trigger the KWallet unlock dialog; blocks until the user logs in.
# Apps below that need the wallet wait on this via wait-kwallet.sh.
exec-once = dbus-send --session --print-reply --dest=org.kde.kwalletd6 /modules/kwalletd6 org.kde.KWallet.open string:"kdewallet" int64:0 string:"autostart"

exec-once = cachy-update --tray
exec-once = flatpak run com.protonvpn.www --minimized

exec-once = ~/.config/hypr/scripts/wait-kwallet.sh signal-desktop --password-store="kwallet6"
exec-once = ~/.config/hypr/scripts/wait-kwallet.sh protonmail-bridge


