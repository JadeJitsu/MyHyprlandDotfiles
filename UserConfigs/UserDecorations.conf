# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
# Border colors extracted from current wallpaper
source = $HOME/.config/hypr/wallust/border-colors.conf

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 4

  col.active_border = $border_active1 $border_active2 45deg
  col.inactive_border = $border_inactive
}

decoration {
  rounding = 10
  
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    color = $shadow_active
    color_inactive = $shadow_inactive
  }

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $border_active1

	groupbar {
		col.active = $border_inactive
  }
}
